services:

  # ── Nginx ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ticketing_nginx
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      app:
        condition: service_healthy
    networks:
      - shared-dev
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── PHP-FPM app ────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    image: ticketing_app:dev
    container_name: ticketing_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_KEY=${APP_KEY}
    networks:
      - shared-dev
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Vite dev server ────────────────────────────────────
  vite:
    image: node:22-alpine
    container_name: ticketing_vite
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "5174:5173"
    command: npm run dev -- --host
    networks:
      - shared-dev
    depends_on:
      - app

  # ── Queue worker ───────────────────────────────────────
  queue-worker:
    image: ticketing_app:dev
    container_name: ticketing_queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    command: php artisan queue:work --queue=high,default,low --sleep=3 --tries=3 --max-time=3600
    depends_on:
      app:
        condition: service_healthy
    networks:
      - shared-dev

  # ── Scheduler ──────────────────────────────────────────
  scheduler:
    image: ticketing_app:dev
    container_name: ticketing_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    command: php artisan schedule:work
    depends_on:
      app:
        condition: service_healthy
    networks:
      - shared-dev

networks:
  shared-dev:
    external: true